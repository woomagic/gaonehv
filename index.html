<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Voltage Cable Capacity Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-glob"></div>
    <div class="container">
        <header>
            <h1>High Voltage Cable Capacity</h1>
            <p class="subtitle">Real-time Ampacity & Transmission Capacity Calculator</p>
        </header>

        <main class="calculator-grid">
            <section class="input-section glass-panel">
                <h2>Configuration</h2>

                <div class="input-group">
                    <label for="voltage">Nominal Voltage (kV)</label>
                    <select id="voltage">
                        <option value="66">66 kV</option>
                        <option value="132">132 kV</option>
                        <option value="154" selected>154 kV</option>
                        <option value="220">220 kV</option>
                        <option value="345">345 kV</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="sq">Nominal Area (mm²)</label>
                    <select id="sq">
                        <option value="400">400 mm²</option>
                        <option value="600">600 mm²</option>
                        <option value="630">630 mm²</option>
                        <option value="800">800 mm²</option>
                        <option value="1000">1000 mm²</option>
                        <option value="1200" selected>1200 mm²</option>
                        <option value="2000">2000 mm²</option>
                        <option value="2500">2500 mm²</option>
                        <option value="3000">3000 mm²</option>
                        <option value="3500">3500 mm²</option>
                        <option value="4500">4500 mm²</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="circuits">Number of Circuits</label>
                    <div class="range-wrapper">
                        <input type="number" id="circuits" value="1" min="1" max="10">
                    </div>
                </div>

                <div class="input-group">
                    <label for="depth">Burial Depth (mm)</label>
                    <input type="number" id="depth" value="1200" step="100">
                </div>

                <div class="input-group">
                    <label for="pf">Power Factor (0.0 - 1.0)</label>
                    <input type="number" id="pf" value="0.9" step="0.01" min="0" max="1">
                </div>

                <!-- Button removed as per request -->

            </section>

            <section class="result-section glass-panel">
                <h2>Results</h2>
                <div id="error-message" class="error-box hidden"></div>

                <div class="result-card">
                    <span class="result-label">Allowable Current</span>
                    <div class="result-value-wrapper">
                        <span id="result-ampere" class="result-value">--</span>
                        <span class="unit">A</span>
                    </div>
                </div>

                <div class="result-card">
                    <span class="result-label">Transmission Capacity</span>
                    <div class="result-value-wrapper">
                        <span id="result-mva" class="result-value">--</span>
                        <span class="unit">MVA</span>
                    </div>
                </div>

                <div class="info-box">
                    <p>Based on steady-state thermal rating at 90°C conductor temp.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuous Current Ratings Calculator</title>
    <link rel="stylesheet" href="styles.css">

    <style>
      .input-errors{
        margin: 10px 0 16px 0;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(255, 193, 7, 0.15);
        border: 1px solid rgba(255, 193, 7, 0.35);
        color: #f0c14b;
        font-size: 0.9rem;
        line-height: 1.3;
        text-align: left;
      }
    </style>
    
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Continuous Current Ratings Calculator</h1>
            <p>This calculator is for easy verification purposes only.</p>
        </div>
        
        <div class="content">
            <div class="inputs-section">
                <div id="input-errors" class="input-errors" style="display:none;" aria-live="polite"></div>
        
                <div class="form-group">
                    <label for="voltage">Nominal Voltage (kV)</label>
                    <div class="input-wrapper">
                        <select id="voltage">
                            <option value="66">66</option>
                            <option value="132">132</option>
                            <option value="138">138</option>
                            <option value="154" selected>154</option>
                            <option value="220">220</option>
                            <option value="345">345</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="area">Conductor Size (mm²)</label>
                    <div class="input-wrapper">
                        <select id="area">
                            <option value="100">100</option>
                            <option value="150">150</option>
                            <option value="185">185</option>
                            <option value="240">240</option>
                            <option value="400" selected>400</option>
                            <option value="600">600</option>
                            <option value="800">800</option>
                            <option value="1000">1000</option>
                            <option value="1200">1200</option>
                            <option value="1600">1600</option>
                            <option value="2000">2000</option>
                            <option value="2500">2500</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="bonding">Bonding Method</label>
                    <div class="input-wrapper">
                        <select id="bonding">
                            <option value="Cross Bonding" selected>Cross Bonding</option>
                            <option value="Single Point Bonding">Single Point Bonding</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="circuits">Number of Circuits</label>
                    <div class="input-wrapper">
                        <input type="number" id="circuits" value="1" min="1" step="1" inputmode="numeric">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="depth">Burial Depth (mm)</label>
                    <div class="input-wrapper">
                        <input type="number" id="depth" value="1500" min="1" step="1" inputmode="numeric">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="pf">Power Factor</label>
                    <div class="input-wrapper">
                        <input type="number" id="pf" value="0.9" min="0" max="1" step="0.01">
                    </div>
                </div>
            </div>
            
            <div class="outputs-section">
                <div class="output-card main-output">
                    <span class="output-label">Current Ratings (I)</span>
                    <span class="output-value" id="out-current">0.0 A</span>
                </div>
                <div class="power-outputs">
                    <div class="output-card sub-output">
                        <span class="output-label">Apparent Power (S)</span>
                        <span class="output-value" id="out-apparent">0.0 MVA</span>
                    </div>
                    <div class="output-card sub-output">
                        <span class="output-label">Active Power (P)</span>
                        <span class="output-value" id="out-active">0.0 MW</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Based on an ambient temperature of 25 degrees</p>
            <p>and a soil thermal resistance of 0.9</p>
            <p class="brand">Gaon Cable Co., Ltd.</p>
        </div>
    </div>
    
    <script>
    (function(){
      const el = (id)=>document.getElementById(id);

      function showErrors(msgs){
        const box = el("input-errors");
        if(!box) return;
        if(!msgs.length){ box.style.display="none"; box.textContent=""; return; }
        box.style.display="block";
        box.textContent = "⚠ " + msgs.join("  |  ");
      }

      function setOutError(){
        const oc = el("out-current");
        const oa = el("out-apparent");
        const op = el("out-active");
        if(oc) oc.textContent = "Error";
        if(oa) oa.textContent = "Error";
        if(op) op.textContent = "Error";
      }

      function validateAndSanitizeInputs(){
        const msgs = [];

        // Power Factor: allow 0~1.0 (inclusive). If outside, clamp and warn.
        const pfEl = el("pf");
        if(pfEl){
          let pf = Number(pfEl.value);
          if(!Number.isFinite(pf)) pf = 0.9;
          if(pf < 0 || pf > 1){
            const clamped = Math.min(1, Math.max(0, pf));
            msgs.push(`Power Factor must be between 0 and 1. Clamped to ${clamped}.`);
            pfEl.value = clamped.toFixed(2).replace(/\.?0+$/,'');
          }
        }

        // Number of Circuits: positive integer only. If not integer, round and warn. If <=0, set to 1.
        const nEl = el("circuits");
        if(nEl){
          let n = Number(nEl.value);
          if(!Number.isFinite(n)) n = 1;
          const rounded = Math.round(n);
          if(n !== rounded){
            msgs.push(`Number of Circuits must be an integer. Rounded to ${rounded}.`);
            n = rounded;
          }
          if(n <= 0){
            msgs.push("Number of Circuits must be a positive integer. Set to 1.");
            n = 1;
          }
          nEl.value = String(n);
        }

        // Burial Depth: positive integer only. (kept consistent with the calculator inputs)
        const dEl = el("depth");
        if(dEl){
          let d = Number(dEl.value);
          if(!Number.isFinite(d)) d = 1500;
          const rounded = Math.round(d);
          if(d !== rounded){
            msgs.push(`Burial Depth must be an integer (mm). Rounded to ${rounded}.`);
            d = rounded;
          }
          if(d <= 0){
            msgs.push("Burial Depth must be a positive integer (mm). Set to 1.");
            d = 1;
          }
          dEl.value = String(d);
        }

        showErrors(msgs);
        if(msgs.length) setOutError();
        return msgs.length === 0;
      }

      window.__validateAndSanitizeInputs = validateAndSanitizeInputs;

      // Run before other listeners (capture phase)
      ["input","change"].forEach(evt=>{
        document.addEventListener(evt, function(e){
          const t = e.target;
          if(!t) return;
          if(["pf","circuits","depth"].includes(t.id)){
            validateAndSanitizeInputs();
          }
        }, true);
      });

      document.addEventListener("DOMContentLoaded", validateAndSanitizeInputs);
    })();
    </script>
    
    <script src="script.js"></script>
</body>
</html>

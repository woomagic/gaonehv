<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuous Current Ratings Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Continuous Current Ratings Calculator</h1>
            <p>This calculator is for easy verification purposes only.</p>
        </div>
        
        <div class="content">
            <div class="inputs-section">
                <div class="form-group">
                    <label for="voltage">Nominal Voltage (kV)</label>
                    <div class="input-wrapper">
                        <select id="voltage">
                            <option value="66">66</option>
                            <option value="132">132</option>
                            <option value="138">138</option>
                            <option value="154" selected>154</option>
                            <option value="220">220</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="area">Conductor Size (mm²)</label>
                    <div class="input-wrapper">
                        <select id="area">
                            <option value="100">100</option>
                            <option value="150">150</option>
                            <option value="185">185</option>
                            <option value="240">240</option>
                            <option value="400" selected>400</option>
                            <option value="600">600</option>
                            <option value="800">800</option>
                            <option value="1000">1000</option>
                            <option value="1200">1200</option>
                            <option value="1600">1600</option>
                            <option value="2000">2000</option>
                            <option value="2500">2500</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="bonding">Bonding Method</label>
                    <div class="input-wrapper">
                        <select id="bonding">
                            <option value="Cross Bonding" selected>Cross Bonding</option>
                            <option value="Single Point Bonding">Single Point Bonding</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="circuits">Number of Circuits</label>
                    <div class="input-wrapper">
                        <input type="number" id="circuits" value="1" min="1">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="depth">Burial Depth (mm)</label>
                    <div class="input-wrapper">
                        <input type="number" id="depth" value="1500" min="1">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="pf">Power Factor</label>
                    <div class="input-wrapper">
                        <input type="number" id="pf" value="0.9" min="0.01" max="1" step="0.01">
                    </div>
                </div>
            </div>
            
            <div class="outputs-section">
                <div class="output-card main-output">
                    <span class="output-label">Current Ratings (I)</span>
                    <span class="output-value" id="out-current">0.0 A</span>
                </div>
                <div class="power-outputs">
                    <div class="output-card sub-output">
                        <span class="output-label">Apparent Power (S)</span>
                        <span class="output-value" id="out-apparent">0.0 MVA</span>
                    </div>
                    <div class="output-card sub-output">
                        <span class="output-label">Active Power (P)</span>
                        <span class="output-value" id="out-active">0.0 MW</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Based on an ambient temperature of 25 degrees</p>
            <p>and a soil thermal resistance of 0.9</p>
            <p class="brand">Gaon Cable Co., Ltd.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
